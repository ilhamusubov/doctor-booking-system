services:
  db:
    image: postgres:15
    container_name: doctor-db
    restart: always
    environment:
      POSTGRES_DB: doctor_booking_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: doctor-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: